<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>管理后台 · 方向匹配器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-login-body">
  <div class="admin-login-container">
    <div class="admin-login-card">
      <div class="admin-login-icon">🧭</div>
      <h1 id="loginTitle">管理后台</h1>
      <p class="admin-login-desc" id="loginDesc">请输入管理密码</p>

      <div class="admin-login-form" id="loginForm">
        <input type="password" class="admin-login-input" id="pw1"
               placeholder="输入密码" autocomplete="off" autofocus>
        <p class="admin-login-error" id="loginError" style="display:none;"></p>
        <button class="btn btn-primary admin-login-btn" id="loginBtn">🔓 解锁</button>
      </div>

      <p class="admin-login-footer">
        <a href="/" class="admin-login-link">← 返回首页</a>
      </p>
    </div>
  </div>

  <!-- Sync 模块必须先加载 -->
  <script src="js/sync.js"></script>
  <script>
    (function() {
      var AUTH_KEY = 'dm_admin_auth';
      var DEFAULT_PW = 'topxnc2026';

      var title = document.getElementById('loginTitle');
      var desc = document.getElementById('loginDesc');
      var pw1 = document.getElementById('pw1');
      var loginBtn = document.getElementById('loginBtn');
      var loginError = document.getElementById('loginError');

      var storedHash = null;

      // 简单哈希（全浏览器通用）
      function hash(str) {
        try {
          if (window.crypto && window.crypto.subtle && window.crypto.subtle.digest) {
            return _sha256(str);
          }
        } catch(e) {}
        return Promise.resolve(_simpleHash(str));
      }

      function _sha256(str) {
        var data = new TextEncoder().encode(str);
        return window.crypto.subtle.digest('SHA-256', data).then(function(buf) {
          var arr = new Uint8Array(buf);
          var hex = '';
          for (var i = 0; i < arr.length; i++) {
            hex += ('00' + arr[i].toString(16)).slice(-2);
          }
          return hex;
        }).catch(function() {
          return _simpleHash(str);
        });
      }

      function _simpleHash(str) {
        var h = 0;
        for (var i = 0; i < str.length; i++) {
          h = ((h << 5) - h + str.charCodeAt(i)) | 0;
          h = (h * 16777619) | 0;
        }
        return 'fb_' + Math.abs(h).toString(36);
      }

      function showError(msg) {
        loginError.textContent = msg;
        loginError.style.display = 'block';
      }

      function hideError() {
        loginError.style.display = 'none';
      }

      // 初始化：从共享存储获取密码
      desc.textContent = '正在连接…';
      loginBtn.disabled = true;
      loginBtn.textContent = '⏳ 连接中…';

      function init() {
        Sync.getPassword().then(function(sharedPw) {
          if (sharedPw) {
            // 共享存储有密码 → 所有端统一使用
            storedHash = sharedPw;
            desc.textContent = '请输入管理密码';
            ready = true;
            loginBtn.disabled = false;
            loginBtn.textContent = '🔓 解锁';
            return;
          }
          // 共享存储无密码 → 使用默认密码 → 同步到共享存储
          return hash(DEFAULT_PW).then(function(h) {
            storedHash = h;
            return Sync.setPassword(h).then(function() {
              desc.textContent = '请输入管理密码';
              ready = true;
              loginBtn.disabled = false;
              loginBtn.textContent = '🔓 解锁';
            });
          });
        }).catch(function() {
          // 网络失败 → 用本地或默认
          var localPw = null;
          try { localPw = localStorage.getItem('dm_admin_pw'); } catch(e) {}
          if (localPw) {
            storedHash = localPw;
          } else {
            hash(DEFAULT_PW).then(function(h) {
              storedHash = h;
              try { localStorage.setItem('dm_admin_pw', h); } catch(e) {}
            });
          }
          desc.textContent = '请输入管理密码';
          ready = true;
          loginBtn.disabled = false;
          loginBtn.textContent = '🔓 解锁';
        });
      }

      var ready = false;

      loginBtn.addEventListener('click', function() {
        hideError();

        var p = pw1.value.trim();
        if (!p) {
          showError('请输入密码');
          return;
        }

        hash(p).then(function(h) {
          if (!storedHash) {
            // 还在加载中，再等一会
            showError('正在验证…请稍后再试');
            return;
          }

          if (h === storedHash) {
            try {
              sessionStorage.setItem(AUTH_KEY, '1');
            } catch(e) {}

            loginBtn.textContent = '✅ 验证通过，跳转中...';
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-verified');
            setTimeout(function() {
              window.location.href = '/index.html#admin';
            }, 400);
          } else {
            showError('密码错误，请重试');
            pw1.value = '';
            pw1.focus();
          }
        }).catch(function(e) {
          showError('验证失败: ' + (e.message || '未知错误'));
        });
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          loginBtn.click();
        }
      });

      // 启动
      init();
    })();
  </script>
</body>
</html>
